name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test pipeline (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the primary target (matches the Airflow image); 3.12 proves
        # forward-compat. Heavy/optional deps have wheels for both.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Regenerate bundled dataset (determinism check)
        run: python -m pipeforge.generate_dataset

      - name: Run data-quality checks
        run: python -m pipeforge check

      - name: Run test suite with coverage (fails under 85%)
        run: |
          pytest -q \
            --cov=pipeforge --cov-report=term-missing \
            --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      - name: Smoke-run the full ELT pipeline (SQLite, all load modes)
        run: |
          python -m pipeforge run
          PIPEFORGE_LOAD_MODE=merge python -m pipeforge run
          PIPEFORGE_LOAD_MODE=append python -m pipeforge run
          python -m pipeforge report
          python -m pipeforge export
          python -m pipeforge export --html --out docs
          test -f docs/index.html && echo "static demo built OK"

  elt-on-postgres:
    name: ELT against Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pipeforge
          POSTGRES_PASSWORD: pipeforge
          POSTGRES_DB: pipeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run ELT into Postgres warehouse (replace + merge)
        env:
          PIPEFORGE_WAREHOUSE: postgres
          PIPEFORGE_POSTGRES_URL: postgresql+psycopg2://pipeforge:pipeforge@localhost:5432/pipeforge
        run: |
          python -m pipeforge run
          PIPEFORGE_LOAD_MODE=merge python -m pipeforge run   # idempotent re-run
          python -m pipeforge report

  dag-parse:
    name: Parse + smoke-test the Airflow DAG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install Airflow with its OWN pinned constraints (which keep
      # SQLAlchemy < 2.0). We deliberately do NOT `pip install` pipeforge or its
      # deps here -- that would upgrade SQLAlchemy to 2.0 and break Airflow's
      # ORM. Instead the repo root goes on PYTHONPATH so `import pipeforge`
      # resolves, exactly as the docker-compose stack bind-mounts the package.
      - name: Install Airflow (pinned constraints)
        env:
          AIRFLOW_VERSION: "2.9.3"
        run: |
          python -m pip install --upgrade pip
          CONSTRAINTS="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-3.11.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINTS}"
          # pandas is not a core Airflow dep; install it under the SAME
          # constraints so SQLAlchemy stays pinned < 2.0 (pipeforge imports pandas).
          pip install pandas --constraint "${CONSTRAINTS}"

      - name: Initialise Airflow metadata DB
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
        run: airflow db migrate

      - name: DAG imports cleanly (no import errors)
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
          # Make `import pipeforge` resolve without pip-installing it.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          airflow dags list
          airflow dags list-import-errors
          # Fail if the pipeforge DAG reported an import error.
          test -z "$(airflow dags list-import-errors 2>/dev/null | grep -i pipeforge || true)"

  static-demo:
    name: Build the static warehouse explorer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Build the standalone static demo bundle
        run: python -m pipeforge export --html --out docs

      - name: Upload static demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: pipeforge-static-demo
          path: docs/index.html
